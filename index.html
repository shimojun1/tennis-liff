

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>テニス出欠確認</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; margin: 0; padding: 16px; background: #f5f5f5; color: #222; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    h2 { font-size: 15px; margin: 24px 0 8px; color: #444; }
    ul { list-style: none; padding: 0; margin: 0; background: #fff; border-radius: 8px; overflow: hidden; }
    li { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #eee; }
    li:last-child { border-bottom: none; }
    .status { font-weight: bold; white-space: nowrap; padding-left: 12px; }
    .status.attend { color: #1DB446; }
    .status.absent { color: #FF5551; }
    .status.pending { color: #AAAAAA; }
    .status.unanswered { color: #F5A623; }
    .empty { text-align: center; color: #999; padding: 24px; }

    #admin { display: none; margin-top: 28px; }
    .admin-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .admin-tag { font-size: 11px; font-weight: bold; color: #fff; background: #27ACB2; border-radius: 4px; padding: 2px 6px; }

    .event-select { width: 100%; padding: 10px; margin: 4px 0 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; background: #fff; box-sizing: border-box; }
    .summary { display: flex; gap: 6px; margin-bottom: 12px; }
    .summary .cell { flex: 1; text-align: center; padding: 8px 0; border-radius: 8px; color: #fff; font-weight: bold; font-size: 13px; }
    .summary .cell .n { display: block; font-size: 20px; }
    .cell.attend { background: #1DB446; }
    .cell.absent { background: #FF5551; }
    .cell.unanswered { background: #F5A623; }

    .ev { background: #fff; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
    .ev-top { display: flex; align-items: center; gap: 8px; }
    .ev-title { font-weight: bold; flex: 1; }
    .badge { font-size: 11px; font-weight: bold; color: #fff; border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
    .badge.draft { background: #AAAAAA; }
    .badge.scheduled { background: #F5A623; }
    .badge.sent { background: #1DB446; }
    .ev-sub { font-size: 12px; color: #888; margin-top: 4px; }
    .ev-btns { display: flex; gap: 6px; margin-top: 10px; }
    .ev-btns button { flex: 1; padding: 8px 0; border-radius: 6px; border: 1px solid #ccc; background: #fff; font-size: 13px; font-weight: bold; cursor: pointer; }
    .ev-btns .send { border-color: #27ACB2; color: #27ACB2; }
    .ev-btns .del { border-color: #FF5551; color: #FF5551; }

    .create-toggle { width: 100%; padding: 12px; margin: 8px 0 4px; border: 1px dashed #27ACB2; background: #fff; color: #27ACB2; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .form-box { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
    .form-box label { display: block; font-size: 13px; color: #555; margin-bottom: 12px; }
    .form-box input, .form-box select { display: block; width: 100%; box-sizing: border-box; margin-top: 4px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; background: #fff; }
    .form-box .chk { display: flex; align-items: center; gap: 8px; }
    .form-box .chk input { width: auto; margin: 0; }
    .submit { width: 100%; padding: 12px; border: none; background: #27ACB2; color: #fff; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .submit.cancel { background: #fff; color: #888; border: 1px solid #ccc; margin-top: 8px; }
    .form-msg { margin-top: 10px; font-size: 13px; color: #555; min-height: 18px; }
  </style>
</head>
<body>
  <h1>自分の回答履歴</h1>
  <ul id="history-list"><li class="empty">読み込み中...</li></ul>

  <div id="admin">
    <div class="admin-head">
      <h1 style="margin:0;">管理者メニュー</h1>
      <span class="admin-tag">管理者</span>
    </div>

    <h2>みんなの出欠</h2>
    <select class="event-select" id="event-select"></select>
    <div class="summary">
      <div class="cell attend"><span class="n" id="c-attend">0</span>参加</div>
      <div class="cell absent"><span class="n" id="c-absent">0</span>不参加</div>
      <div class="cell unanswered"><span class="n" id="c-unans">0</span>未回答</div>
    </div>
    <ul id="roster-list"></ul>

    <h2>イベント管理</h2>
    <div id="event-admin-list"></div>

    <h2>新しい練習を作る</h2>
    <button id="toggle-create" class="create-toggle">＋ フォームを開く</button>
    <div id="create-form" class="form-box" style="display:none;">
      <label>日付<input type="date" id="f-date" /></label>
      <label>開始時刻<select id="f-start"></select></label>
      <label>終了時刻<select id="f-end"></select></label>
      <label>場所
        <select id="f-place">
          <option value="ハードコート">ハードコート</option>
          <option value="オムニコート">オムニコート</option>
          <option value="未定">未定</option>
        </select>
      </label>
      <label>回答締切(任意)<input type="datetime-local" id="f-deadline" /></label>
      <label>送信方法
        <select id="f-method">
          <option value="draft">下書き保存（あとで手動送信）</option>
          <option value="scheduled">予約送信（日時指定）</option>
        </select>
      </label>
      <label id="f-sendat-wrap" style="display:none;">予約送信日時<input type="datetime-local" id="f-sendat" /></label>
      <label class="chk" id="f-notify-wrap" style="display:none;"><input type="checkbox" id="f-notify" />変更をLINEに通知する</label>
      <button id="f-submit" class="submit">保存</button>
      <button id="f-cancel" class="submit cancel" style="display:none;">編集をやめる</button>
      <div id="f-msg" class="form-msg"></div>
    </div>
  </div>

  <script>
    // ▼▼▼ 自分の値に書き換えてください ▼▼▼
    var LIFF_ID = "2010379953-pb85Fy7Z";
    var GAS_URL = "https://script.google.com/macros/s/AKfycbyM2bBSqgJheZIacNm_f4U7VrsxAk62lv_ZdEbuh8U3hPi3nANoI1an45JBQyarCLxk/exec"; // 例: https://script.google.com/macros/s/AKfy.../exec
    var ADMIN_USER_ID = "U4232e2b08ca43363cee26159aa76b441";
    // ▲▲▲ ここまで ▲▲▲

    var STATUS_CLASS = { "参加": "attend", "不参加": "absent", "未定": "pending", "未回答": "unanswered" };
    var STATUS_LABEL = { draft: "下書き", scheduled: "予約中", sent: "送信済み" };
    var WD = ["日", "月", "火", "水", "木", "金", "土"];
    var MY_ID = "";
    var editingId = null; // 編集中のeventId（nullなら新規作成）

    function pad(n) { return (n < 10 ? "0" : "") + n; }
    function fmtYMD(dt) { return dt.getFullYear() + "-" + pad(dt.getMonth() + 1) + "-" + pad(dt.getDate()); }

    function jsonp(url) {
      return new Promise(function (resolve, reject) {
        var cb = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        var script = document.createElement("script");
        var timer = setTimeout(function () { cleanup(); reject(new Error("timeout")); }, 12000);
        function cleanup() { clearTimeout(timer); delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); }
        window[cb] = function (data) { cleanup(); resolve(data); };
        script.onerror = function () { cleanup(); reject(new Error("network")); };
        script.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + "callback=" + cb;
        document.body.appendChild(script);
      });
    }

    function makeRow(name, statusText) {
      var li = document.createElement("li");
      var label = document.createElement("span");
      label.textContent = name;
      var status = document.createElement("span");
      status.textContent = statusText;
      status.className = "status " + (STATUS_CLASS[statusText] || "unanswered");
      li.appendChild(label); li.appendChild(status);
      return li;
    }

    function renderHistory(history) {
      var list = document.getElementById("history-list");
      list.innerHTML = "";
      if (!history || history.length === 0) { list.innerHTML = '<li class="empty">予定がありません</li>'; return; }
      history.forEach(function (h) { list.appendChild(makeRow(h.label, h.status)); });
    }

    function renderRoster(data) {
      var roster = (data && data.roster) || [];
      var counts = { "参加": 0, "不参加": 0, "未回答": 0 };
      var list = document.getElementById("roster-list");
      list.innerHTML = "";
      if (roster.length === 0) list.innerHTML = '<li class="empty">回答・メンバーがいません</li>';
      roster.forEach(function (r) {
        if (counts[r.status] === undefined) counts[r.status] = 0;
        counts[r.status]++;
        list.appendChild(makeRow(r.displayName, r.status));
      });
      document.getElementById("c-attend").textContent = counts["参加"];
      document.getElementById("c-absent").textContent = counts["不参加"];
      document.getElementById("c-unans").textContent = counts["未回答"];
    }

    function renderEventAdmin(events) {
      var box = document.getElementById("event-admin-list");
      box.innerHTML = "";
      if (!events || events.length === 0) { box.innerHTML = '<div class="empty">イベントがありません</div>'; return; }
      events.forEach(function (ev) {
        var card = document.createElement("div");
        card.className = "ev";

        var top = document.createElement("div");
        top.className = "ev-top";
        var title = document.createElement("span");
        title.className = "ev-title";
        title.textContent = ev.label;
        var badge = document.createElement("span");
        badge.className = "badge " + ev.status;
        badge.textContent = STATUS_LABEL[ev.status] || ev.status;
        top.appendChild(title); top.appendChild(badge);

        var sub = document.createElement("div");
        sub.className = "ev-sub";
        var subParts = [];
        if (ev.datetime) subParts.push(ev.datetime);
        if (ev.place) subParts.push(ev.place);
        if (ev.status === "scheduled" && ev.sendAt) subParts.push("予約: " + ev.sendAt);
        if (ev.deadline) subParts.push("締切: " + ev.deadline);
        sub.textContent = subParts.join(" / ");

        var btns = document.createElement("div");
        btns.className = "ev-btns";
        if (ev.status !== "sent") {
          var bSend = document.createElement("button");
          bSend.className = "send"; bSend.textContent = "今すぐ送信";
          bSend.onclick = function () { sendEvent(ev.eventId); };
          btns.appendChild(bSend);
        }
        var bEdit = document.createElement("button");
        bEdit.textContent = "編集";
        bEdit.onclick = function () { startEdit(ev); };
        btns.appendChild(bEdit);
        var bDel = document.createElement("button");
        bDel.className = "del"; bDel.textContent = "削除";
        bDel.onclick = function () { deleteEvent(ev.eventId, ev.label); };
        btns.appendChild(bDel);

        card.appendChild(top); card.appendChild(sub); card.appendChild(btns);
        box.appendChild(card);
      });
    }

    function fillEventSelect(events, selectedId) {
      var select = document.getElementById("event-select");
      select.innerHTML = "";
      events.forEach(function (ev) {
        var opt = document.createElement("option");
        opt.value = ev.eventId;
        opt.textContent = ev.label + "（" + (STATUS_LABEL[ev.status] || ev.status) + "）";
        select.appendChild(opt);
      });
      if (selectedId) select.value = selectedId;
      select.onchange = function () { loadRoster(select.value); };
    }

    async function loadRoster(eventId) {
      var url = GAS_URL + "?api=eventroster&userId=" + encodeURIComponent(MY_ID) + (eventId ? "&eventId=" + encodeURIComponent(eventId) : "");
      var data = await jsonp(url);
      if (data.error) return;
      renderRoster(data);
    }

    async function loadAdmin() {
      var data = await jsonp(GAS_URL + "?api=adminall&userId=" + encodeURIComponent(MY_ID));
      if (data.error) { document.getElementById("event-admin-list").innerHTML = '<div class="empty">' + data.error + '</div>'; return; }
      renderHistory(data.history);
      fillEventSelect(data.events || [], data.rosterEventId);
      renderRoster({ roster: data.roster || [] });
      renderEventAdmin(data.events || []);
    }

    function buildTimeOptions(sel) {
      for (var h = 6; h <= 22; h++) {
        for (var m = 0; m < 60; m += 30) {
          var v = pad(h) + ":" + pad(m);
          var o = document.createElement("option");
          o.value = v; o.textContent = v; sel.appendChild(o);
        }
      }
    }

    // "2026-06-14 11:00" <-> datetime-local "2026-06-14T11:00"
    function toLocalInput(s) { return s ? s.replace(" ", "T").slice(0, 16) : ""; }
    function fromLocalInput(s) { return s ? s.replace("T", " ") : ""; }

    function resetForm() {
      editingId = null;
      document.getElementById("f-date").value = "";
      document.getElementById("f-start").value = "09:00";
      document.getElementById("f-end").value = "11:00";
      document.getElementById("f-place").value = "ハードコート";
      document.getElementById("f-deadline").value = "";
      document.getElementById("f-method").value = "draft";
      document.getElementById("f-sendat").value = "";
      document.getElementById("f-notify").checked = false;
      document.getElementById("f-msg").textContent = "";
      document.getElementById("f-method").parentElement.style.display = "block";
      document.getElementById("f-sendat-wrap").style.display = "none";
      document.getElementById("f-notify-wrap").style.display = "none";
      document.getElementById("f-cancel").style.display = "none";
      document.getElementById("f-submit").textContent = "保存";
      document.querySelector("#admin h2:nth-of-type(3)") && null;
    }

    function startEdit(ev) {
      editingId = ev.eventId;
      // datetime "09:00-11:00" を分解
      var times = (ev.datetime || "").split("-");
      var start = (times[0] || "09:00").trim();
      var end = (times[1] || "11:00").trim();
      // 日付は endTime の日付部分から
      var dateStr = ev.endTime ? ev.endTime.split(" ")[0] : "";
      document.getElementById("f-date").value = dateStr;
      document.getElementById("f-start").value = start;
      document.getElementById("f-end").value = end;
      document.getElementById("f-place").value = ev.place || "ハードコート";
      document.getElementById("f-deadline").value = toLocalInput(ev.deadline);
      document.getElementById("f-sendat").value = toLocalInput(ev.sendAt);
      // 編集中は送信方法は隠す（状態は変えない）。予約中なら予約日時だけ編集可
      document.getElementById("f-method").parentElement.style.display = "none";
      document.getElementById("f-sendat-wrap").style.display = (ev.status === "scheduled") ? "block" : "none";
      document.getElementById("f-notify-wrap").style.display = "flex";
      document.getElementById("f-notify").checked = false;
      document.getElementById("f-cancel").style.display = "block";
      document.getElementById("f-submit").textContent = "変更を保存";
      document.getElementById("f-msg").textContent = "";
      document.getElementById("create-form").style.display = "block";
      document.getElementById("create-form").scrollIntoView({ behavior: "smooth" });
    }

    function buildFields() {
      var date = document.getElementById("f-date").value;
      var start = document.getElementById("f-start").value;
      var end = document.getElementById("f-end").value;
      var place = document.getElementById("f-place").value;
      var deadline = fromLocalInput(document.getElementById("f-deadline").value);
      if (!date) return null;
      var p = date.split("-"), y = +p[0], mo = +p[1], d = +p[2];
      var wd = WD[new Date(y, mo - 1, d).getDay()];
      var label = mo + "/" + d + "(" + wd + ") テニス（" + place + "）";
      var datetime = start + "-" + end;
      var endTime = date + " " + end;
      return { label: label, datetime: datetime, endTime: endTime, deadline: deadline, place: place };
    }

    async function submitForm() {
      var msg = document.getElementById("f-msg");
      var f = buildFields();
      if (!f) { msg.textContent = "日付を選んでください"; return; }

      msg.textContent = "保存中...";
      try {
        var url;
        if (editingId) {
          url = GAS_URL + "?api=updateevent&userId=" + encodeURIComponent(MY_ID)
            + "&eventId=" + encodeURIComponent(editingId)
            + "&label=" + encodeURIComponent(f.label)
            + "&datetime=" + encodeURIComponent(f.datetime)
            + "&endTime=" + encodeURIComponent(f.endTime)
            + "&deadline=" + encodeURIComponent(f.deadline)
            + "&place=" + encodeURIComponent(f.place)
            + "&notify=" + (document.getElementById("f-notify").checked ? "1" : "0");
          var sa = fromLocalInput(document.getElementById("f-sendat").value);
          if (document.getElementById("f-sendat-wrap").style.display !== "none") {
            url += "&sendAt=" + encodeURIComponent(sa);
          }
        } else {
          var method = document.getElementById("f-method").value;
          var sendAt = method === "scheduled" ? fromLocalInput(document.getElementById("f-sendat").value) : "";
          if (method === "scheduled" && !sendAt) { msg.textContent = "予約送信日時を入れてください"; return; }
          url = GAS_URL + "?api=createevent&userId=" + encodeURIComponent(MY_ID)
            + "&label=" + encodeURIComponent(f.label)
            + "&datetime=" + encodeURIComponent(f.datetime)
            + "&endTime=" + encodeURIComponent(f.endTime)
            + "&deadline=" + encodeURIComponent(f.deadline)
            + "&place=" + encodeURIComponent(f.place)
            + "&status=" + method
            + "&sendAt=" + encodeURIComponent(sendAt);
        }
        var res = await jsonp(url);
        if (res.error) { msg.textContent = "エラー: " + res.error; return; }
        msg.textContent = editingId ? "変更を保存しました" : "保存しました";
        resetForm();
        document.getElementById("create-form").style.display = "none";
        await loadAdmin();
      } catch (e) { msg.textContent = "エラー: " + (e && e.message ? e.message : e); }
    }

    async function sendEvent(eventId) {
      if (!confirm("このイベントをLINEグループに送信します。よろしいですか？")) return;
      var res = await jsonp(GAS_URL + "?api=sendevent&userId=" + encodeURIComponent(MY_ID) + "&eventId=" + encodeURIComponent(eventId));
      if (res.error) { alert("エラー: " + res.error); return; }
      await loadAdmin();
    }

    async function deleteEvent(eventId, label) {
      if (!confirm("「" + label + "」を削除します。回答データも消えます。よろしいですか？")) return;
      var res = await jsonp(GAS_URL + "?api=deleteevent&userId=" + encodeURIComponent(MY_ID) + "&eventId=" + encodeURIComponent(eventId));
      if (res.error) { alert("エラー: " + res.error); return; }
      await loadAdmin();
    }

    function setupForm() {
      buildTimeOptions(document.getElementById("f-start"));
      buildTimeOptions(document.getElementById("f-end"));
      resetForm();
      document.getElementById("toggle-create").onclick = function () {
        var f = document.getElementById("create-form");
        if (f.style.display === "none" || !f.style.display) { resetForm(); f.style.display = "block"; }
        else { f.style.display = "none"; }
      };
      document.getElementById("f-method").onchange = function () {
        document.getElementById("f-sendat-wrap").style.display = (this.value === "scheduled") ? "block" : "none";
      };
      document.getElementById("f-submit").onclick = submitForm;
      document.getElementById("f-cancel").onclick = function () {
        resetForm();
        document.getElementById("create-form").style.display = "none";
      };
    }

    (async function () {
      var list = document.getElementById("history-list");
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        var profile = await liff.getProfile();
        MY_ID = profile.userId;

        if (MY_ID === ADMIN_USER_ID) {
          document.getElementById("admin").style.display = "block";
          setupForm();
          await loadAdmin(); // 履歴も一覧もこの1回でまとめて取得
        } else {
          var hist = await jsonp(GAS_URL + "?api=myhistory&userId=" + encodeURIComponent(MY_ID));
          if (hist.error) list.innerHTML = '<li class="empty">' + hist.error + '</li>';
          else renderHistory(hist.history);
        }
      } catch (e) {
        list.innerHTML = '<li class="empty">エラー: ' + (e && e.message ? e.message : e) + '</li>';
      }
    })();
  </script>
</body>
</html>
